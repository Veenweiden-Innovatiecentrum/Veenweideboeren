<div style="background:var(--bg3);border:1px solid rgba(0,0,0,.06);border-radius:var(--radius-lg);padding:1.5rem;margin:1.5rem 0;overflow-x:auto">
    <svg viewBox="0 0 560 370" style="width:100%;max-width:520px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#1d3176"/></marker>
        <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3ea635"/></marker>
        <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#C49A1E"/></marker>

      <!-- Ruimte → Perspectief (boven naar rechtsonder) -->
      <path d="M 316,120 Q 398,178 383,232" fill="none" stroke="#1d3176" stroke-width="2" marker-end="url(#arr-blue)"/>
      <text x="398" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d3176" font-style="italic">schept de voorwaarden</text>

      <!-- Perspectief → Beweging (rechtsonder naar linksonder) -->
      <path d="M 369,280 Q 280,320 191,280" fill="none" stroke="#3ea635" stroke-width="2" marker-end="url(#arr-green)"/>
      <text x="280" y="328" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3ea635" font-style="italic">wekt vertrouwen</text>

      <!-- Beweging → Ruimte (linksonder naar boven) -->
      <path d="M 187,232 Q 162,178 244,120" fill="none" stroke="#C49A1E" stroke-width="2" marker-end="url(#arr-amber)"/>
      <text x="172" y="168" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C49A1E" font-style="italic">levert politiek bewijs</text>

      <circle cx="280" cy="75" r="56" fill="#e5e9f3" stroke="#1d3176" stroke-width="2"/>

      <text x="280" y="87" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d3176">op beleidsniveau</text>

      <!-- Beweging node (amber, linksonder) -->
      <circle cx="135" cy="278" r="56" fill="#FDF3D0" stroke="#C49A1E" stroke-width="2"/>
      <text x="135" y="274" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="700" fill="#C49A1E">Beweging</text>
      <text x="135" y="290" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#C49A1E">in het gebied</text>

      <!-- Perspectief node (groen, rechtsonder) -->
      <circle cx="425" cy="278" r="56" fill="#e8f2e5" stroke="#3ea635" stroke-width="2"/>
      <text x="425" y="274" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-weight="700" fill="#2d6a23">Perspectief</text>
      <text x="425" y="290" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2d6a23">voor boer én maatschappij</text>
